<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacecraft Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculateur de composants et ressources</h1>

        <div class="controls">
            <div class="field">
                <label for="itemSearch">Objet à crafter</label>
                <div class="recipe-search-box">
                    <input type="text" id="itemSearch" class="search-input" placeholder="Rechercher ou choisir un objet..." autocomplete="off">
                    <div id="itemsDropdown" class="dropdown-list hidden"></div>
                </div>
            </div>
            <div class="field">
                <label>Quantité</label>
                <div class="item-controls">
                    <button type="button" class="qty-btn" id="mainMinus">-</button>
                    <input type="number" id="mainQty" class="qty-input" value="1" min="1">
                    <button type="button" class="qty-btn" id="mainPlus">+</button>
                </div>
            </div>
            <button id="addBtn">Ajouter à la liste</button>
        </div>

        <div class="section queue-section">
            <h3 class="collapsible">Liste de constructions</h3>
            <div id="queueList"></div>
            <button id="clearBtn" class="remove-btn hidden">Tout supprimer</button>
        </div>

        <div id="stockArea" class="section stock-section hidden">
            <h3 class="collapsible">Stock de départ</h3>
            <div id="stockTotals"></div>
            <button id="clearStockBtn" class="remove-btn hidden">Réinitialiser le stock</button>
        </div>

        <div id="componentsArea" class="section components-section hidden">
            <h3 class="collapsible">Composants intermédiaires</h3>
            <div id="componentTotals"></div>
        </div>

        <div id="resultArea" class="section result-section hidden">
            <h3 class="collapsible">Total des ressources</h3>
            <div id="resourceTotals"></div>
        </div>
    </div>

    <!-- Chargement des scripts : les données d'abord, la logique ensuite -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
